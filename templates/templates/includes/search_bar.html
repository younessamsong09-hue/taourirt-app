<div class="search-section" style="position: relative; display: flex; gap: 10px; margin-bottom: 25px;">
    <div style="position: relative; flex: 1;">
        <input type="text" id="user-query" placeholder="اكتب مشكلتك هنا (مثلاً: رخصة السياقة)..." 
               style="width: 100%; padding: 18px 45px 18px 15px; border-radius: 20px; border: 2px solid #eee; outline: none; font-size: 16px;">
        <button onclick="startVoiceSearch()" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; cursor: pointer;">🎤</button>
    </div>
    <button onclick="runSearch()" style="background: var(--main); color: white; border: none; padding: 0 25px; border-radius: 20px; font-weight: bold; cursor: pointer;">بحث</button>
</div>
