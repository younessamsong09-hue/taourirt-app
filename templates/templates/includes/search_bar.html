<div class="search-section" style="display: flex; gap: 10px; margin-bottom: 25px;">
    <div style="position: relative; flex: 1;">
        <input type="text" id="user-query" placeholder="اكتب مشكلتك هنا..." 
               style="width: 100%; padding: 15px; border-radius: 20px; border: 2px solid #eee; outline: none;">
        <button onclick="startVoiceSearch()" style="position: absolute; right: 10px; top: 12px; border:none; background:none; cursor:pointer;">🎤</button>
    </div>
    <button onclick="runSearch()" style="background: var(--main); color: white; border: none; padding: 0 20px; border-radius: 20px; font-weight: bold; cursor: pointer;">بحث</button>
</div>
