{% extends "base.html" %}

{% block content %}
    {% include "ticker.html" %}

    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Flag_of_Morocco.svg" width="50" style="border-radius:5px;">
        <h1 style="color: var(--main); margin: 5px 0; font-size: 22px;">المنصة الوطنية</h1>
    </div>

    <div class="search-area" style="position:relative; margin-bottom:25px; display:flex; gap:10px;">
        <input type="text" id="query" placeholder="اكتب أو تكلم بالدارجة..." style="flex:1; padding:15px; border-radius:15px; border:2px solid #eee; outline:none;">
        <button onclick="startVoice()" style="background:none; border:none; font-size:22px; cursor:pointer;">🎤</button>
        <button onclick="doSearch()" style="background:var(--main); color:white; border:none; padding:0 15px; border-radius:15px; font-weight:bold;">بحث</button>
    </div>

    <p style="font-weight: bold; margin-bottom: 15px;">✨ حلول قانونية قد تهمك:</p>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <div class="card" onclick="fastSearch('استرجاع مال التأمين')">💰<br>استرجاع مال التأمين</div>
        <div class="card" onclick="fastSearch('تعويض حفر الطرق')">🕳️<br>تعويض حفر الطرق</div>
        <div class="card" onclick="fastSearch('رفع الرهن')">⚠️<br>رفع الرهن عن السيارة</div>
        <div class="card" onclick="fastSearch('عطب الكهرباء')">🔌<br>تعويض عطب الكهرباء</div>
    </div>

    <div id="result-box" style="display:none; margin-top:20px; border-top:2px solid #eee; padding-top:15px;"></div>

    <script>
        // هنا نضع كود الـ JavaScript (doSearch, startVoice, fastSearch)
        // سأعطيك إياه بمجرد أن تنتهي من إنشاء الملفات أعلاه
    </script>

    <style>
        .card { background:white; border:1px solid #eee; padding:20px; border-radius:25px; text-align:center; cursor:pointer; font-size:13px; font-weight:bold; transition:0.3s; }
        .card:hover { border-color:var(--main); transform:translateY(-3px); }
    </style>
{% endblock %}
