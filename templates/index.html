<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة الوطنية للحلول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #1a6d36; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .app-container { max-width: 450px; margin: auto; background: white; border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 25px; }
        .header img { width: 50px; }
        
        .search-area { position: relative; margin-bottom: 25px; }
        .search-area input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; box-sizing: border-box; font-size: 16px; outline: none; }
        .search-area button { position: absolute; left: 8px; top: 8px; background: var(--main); border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; }

        .discovery-section { margin-top: 20px; text-align: right; }
        .discovery-title { font-weight: bold; font-size: 15px; margin-bottom: 12px; color: #333; }
        
        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-card { background: #fff; border: 1.5px solid #f0f0f0; padding: 15px; border-radius: 18px; text-align: center; cursor: pointer; transition: 0.3s; }
        .info-card:hover { border-color: var(--main); transform: translateY(-3px); }
        .card-emoji { font-size: 28px; display: block; margin-bottom: 5px; }
        .card-label { font-size: 12px; font-weight: bold; color: #444; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Flag_of_Morocco.svg" alt="Morocco">
        <h1 style="color: var(--main); font-size: 22px; margin: 10px 0 5px;">المنصة الوطنية</h1>
        <p style="color: #888; font-size: 13px; margin: 0;">أسرار المساطر الإدارية وحقوقك الضائعة</p>
    </div>

    <div class="search-area">
        <input type="text" id="search-bar" placeholder="ابحث هنا...">
        <button onclick="triggerSearch()">بحث</button>
    </div>

    <div class="discovery-section">
        <div class="discovery-title">✨ هل كنت تعلم؟ (اكتشف حقوقك):</div>
        <div class="cards-grid">
            <div class="info-card" onclick="setQuery('استرجاع تأمين')">
                <span class="card-emoji">💰</span>
                <span class="card-label">استرجع مال التأمين</span>
            </div>
            <div class="info-card" onclick="setQuery('حفرة الطريق')">
                <span class="card-emoji">🕳️</span>
                <span class="card-label">تعويض حفر الطرق</span>
            </div>
            <div class="info-card" onclick="setQuery('احتراق الأجهزة')">
                <span class="card-emoji">🔌</span>
                <span class="card-label">تعويض عطب الكهرباء</span>
            </div>
            <div class="info-card" onclick="setQuery('الرهن البنكي')">
                <span class="card-emoji">⚠️</span>
                <span class="card-label">فحص رهن السيارة</span>
            </div>
        </div>
    </div>
</div>

<script>
    function setQuery(val) {
        document.getElementById('search-bar').value = val;
    }
    function triggerSearch() {
        const q = document.getElementById('search-bar').value;
        if(q) alert('جاري البحث عن: ' + q); // سنربطها لاحقاً بـ API
    }
</script>

</body>
</html>
