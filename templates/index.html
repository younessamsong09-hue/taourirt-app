<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة الوطنية - دليل الحلول الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --main: #1a6d36; --accent: #c1272d; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-container { max-width: 500px; margin: auto; background: white; border-radius: 30px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* الهيدر */
        .header { text-align: center; margin-bottom: 15px; }
        .header img { width: 50px; margin-bottom: 5px; }
        .header h1 { color: var(--main); margin: 0; font-size: 22px; }

        /* الشريط الإخباري المتحرك */
        .ticker-wrapper { display: flex; background: white; border: 2px solid var(--main); border-radius: 12px; overflow: hidden; margin-bottom: 15px; height: 35px; align-items: center; }
        .ticker-title { background: var(--main); color: white; padding: 0 10px; font-weight: bold; font-size: 12px; height: 100%; display: flex; align-items: center; white-space: nowrap; }
        .ticker-content { flex: 1; overflow: hidden; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: marquee 20s linear infinite; font-size: 12px; color: #333; }
        .ticker-text span { margin-left: 40px; }
        @keyframes marquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* صندوق البحث مع الميكروفون */
        .search-box { position: relative; margin-bottom: 20px; display: flex; gap: 5px; }
        .search-input-wrapper { position: relative; flex: 1; }
        .search-input-wrapper input { width: 100%; padding: 15px 45px 15px 15px; border: 2px solid #eee; border-radius: 15px; font-size: 15px; outline: none; box-sizing: border-box; }
        .voice-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .voice-btn.recording { color: var(--accent); animation: pulse 1s infinite; }
        .search-btn { background: var(--main); color: white; border: none; padding: 0 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* منطقة النتائج */
        #result-card { display: none; background: #fff; border: 2px solid #f0f0f0; border-radius: 20px; padding: 15px; margin-top: 15px; animation: slideUp 0.4s ease; }
        .res-title { color: var(--main); font-size: 18px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 12px; display: block; }
        .data-item { margin-bottom: 8px; font-size: 14px; line-height: 1.5; }
        .label { font-weight: bold; color: var(--accent); }

        /* أزرار الأكشن */
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn { padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 13px; text-decoration: none; }
        .btn-pdf { background: #eee; color: #333; }
        .btn-wa { background: #25D366; color: white; }

        /* الحاسبة */
        .calc-section { background: #fff9f9; border-radius: 15px; padding: 12px; border: 1px dashed var(--accent); margin-top: 20px; }
        .calc-section input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-top: 5px; box-sizing: border-box; }

        .quick-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .q-card { background: white; border: 1px solid #eee; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; }
        
        @keyframes pulse { 0% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-50%) scale(1.2); } 100% { transform: translateY(-50%) scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Flag_of_Morocco.svg" alt="المغرب">
        <h1>المنصة الوطنية</h1>
    </div>

    <div class="ticker-wrapper">
        <div class="ticker-title">🔥 عاجل</div>
        <div class="ticker-content">
            <div class="ticker-text">
                <span>• انطلاق التسجيل في دعم السكن 2026</span>
                <span>• تحديث وثائق جواز السفر (تمبر 500 درهم)</span>
                <span>• ميزة البحث الصوتي بالدارجة متوفرة الآن</span>
            </div>
        </div>
    </div>

    <div class="search-box">
        <div class="search-input-wrapper">
            <input type="text" id="query" placeholder="اكتب أو تكلم بالدارجة..." onkeypress="if(event.key==='Enter') doSearch()">
            <button class="voice-btn" id="voice-btn" onclick="startVoiceSearch()">🎤</button>
        </div>
        <button class="search-btn" onclick="doSearch()">بحث</button>
    </div>

    <div id="result-card">
        <div id="pdf-content">
            <span class="res-title" id="out-title"></span>
            <div id="out-body"></div>
        </div>
        <div class="action-btns">
            <button class="btn btn-pdf" onclick="downloadPDF()">📥 تحميل PDF</button>
            <a id="wa-btn" href="#" target="_blank" class="btn btn-wa">📲 واتساب</a>
        </div>
    </div>

    <div class="calc-section">
        <p style="font-weight: bold; font-size: 13px; color: var(--accent); margin: 0;">🧮 حاسبة تمبر الجواز (500 د.م/شخص):</p>
        <input type="number" id="p-count" placeholder="عدد الأشخاص" oninput="calcStamp()">
        <p id="calc-res" style="font-weight: bold; color: var(--main); margin: 5px 0 0; font-size: 14px;"></p>
    </div>

    <p style="font-weight: bold; margin-top: 20px; font-size: 14px;">✨ حلول سريعة:</p>
    <div class="quick-cards">
        <div class="q-card" onclick="quickSearch('دعم السكن')">🏠 دعم السكن</div>
        <div class="q-card" onclick="quickSearch('حفرة الطريق')">🕳️ تعويض الحفر</div>
        <div class="q-card" onclick="quickSearch('جواز سفر')">🛂 جواز السفر</div>
        <div class="q-card" onclick="quickSearch('الرشوة')">🚫 تبليغ رشوة</div>
    </div>
</div>

<script>
    // 1. وظيفة البحث الصوتي بالدارجة
    function startVoiceSearch() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("متصفحك لا يدعم الصوت");
        
        const rec = new SpeechRecognition();
        rec.lang = 'ar-MA';
        rec.onstart = () => document.getElementById('voice-btn').classList.add('recording');
        rec.onresult = (e) => {
            document.getElementById('query').value = e.results[0][0].transcript;
            doSearch();
        };
        rec.onend = () => document.getElementById('voice-btn').classList.remove('recording');
        rec.start();
    }

    // 2. البحث الأساسي
    async function doSearch() {
        const q = document.getElementById('query').value;
        const card = document.getElementById('result-card');
        if(!q) return;

        card.style.display = 'block';
        card.innerHTML = '<p style="text-align:center; font-size:13px;">جاري استخراج الحل القانوني... ⏳</p>';

        const res = await fetch('/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt: q})
        });
        const data = await res.json();

        if(data.found) {
            const waMsg = encodeURIComponent(`✅ معلومة من المنصة الوطنية:\n🔹 ${data.title}\n📄 الوثائق: ${data.docs}\n💰 التكلفة: ${data.cost}`);
            card.innerHTML = `
                <div id="pdf-content">
                    <span class="res-title">${data.title}</span>
                    <div class="data-item"><span class="label">📄 الوثائق: </span>${data.docs}</div>
                    <div class="data-item"><span class="label">💰 التكلفة: </span>${data.cost}</div>
                    <div class="data-item"><span class="label">📍 المكان: </span>${data.location}</div>
                </div>
                <div class="action-btns">
                    <button class="btn btn-pdf" onclick="downloadPDF()">📥 تحميل PDF</button>
                    <a href="https://wa.me/?text=${waMsg}" target="_blank" class="btn btn-wa">📲 واتساب</a>
                </div>
            `;
        } else {
            card.innerHTML = '<p style="color:red; text-align:center; font-size:13px;">لم نجد النتيجة، جرب كلمات أخرى.</p>';
        }
    }

    // 3. تحميل PDF
    function downloadPDF() {
        const element = document.getElementById('pdf-content');
        html2pdf().from(element).set({margin: 10, filename: 'solution.pdf'}).save();
    }

    // 4. الحاسبة
    function calcStamp() {
        const val = document.getElementById('p-count').value;
        document.getElementById('calc-res').innerText = val > 0 ? `المجموع: ${val * 500} درهم` : "";
    }

    function quickSearch(t) { document.getElementById('query').value = t; doSearch(); }
</script>

</body>
</html>
