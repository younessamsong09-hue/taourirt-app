{% extends "base.html" %}

{% block content %}
    {% include "ticker.html" %}

    <div style="text-align: center; margin: 30px 0;">
        <h1 style="color: var(--main); font-size: 26px;">المنصة الوطنية للحلول</h1>
        <p style="color: #666; font-size: 14px;">دليلك الذكي للمساطر الإدارية</p>
    </div>

    {% include "includes/search_bar.html" %}
    {% include "includes/categories.html" %}
    {% include "includes/results_area.html" %}

    <script>
        async function runSearch() {
            const query = document.getElementById('user-query').value;
            const display = document.getElementById('results-display');
            if(!query) return;

            display.style.display = 'block';
            display.innerHTML = '<div style="text-align:center">جاري فحص القواعد الوطنية... ⏳</div>';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt: query})
                });
                const data = await response.json();

                if(data.found) {
                    // تحويل الوثائق إلى قائمة نقاط كما في التصميم السابق
                    const docsList = data.docs.split('-').filter(i => i.trim() !== "").map(doc => `<li>✅ ${doc.trim()}</li>`).join('');

                    display.innerHTML = `
                        <h3 style="color:var(--main); border-bottom:1px solid #eee; padding-bottom:10px;">${data.title}</h3>
                        <div style="margin-top:15px; text-align:right;">
                            <p><b>📄 الوثائق المطلوبة:</b></p>
                            <ul style="list-style:none; padding:0; line-height:1.6;">${docsList}</ul>
                            <p><b>💰 التكلفة:</b> ${data.cost}</p>
                            <p><b>📍 المكان:</b> ${data.location}</p>
                        </div>
                        <div style="margin-top:20px; display:flex; gap:10px;">
                            <button onclick="window.print()" style="flex:1; padding:12px; border-radius:12px; border:1px solid #ddd; background:#fff; cursor:pointer;">📥 طباعة الدليل</button>
                            <a href="https://wa.me/?text=${encodeURIComponent('دليل ' + data.title)}" target="_blank" style="flex:1; padding:12px; border-radius:12px; background:#25D366; color:white; text-align:center; text-decoration:none; font-weight:bold;">💬 مشاركة</a>
                        </div>
                    `;
                } else {
                    display.innerHTML = '<p style="color:red; text-align:center;">عذراً، لم نجد نتيجة. حاول بكلمات أخرى.</p>';
                }
            } catch (e) {
                display.innerHTML = '<p style="color:red; text-align:center;">حدث خطأ في الاتصال بالسيرفر.</p>';
            }
        }

        function fastAction(text) {
            document.getElementById('user-query').value = text;
            runSearch();
        }

        function startVoiceSearch() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("المتصفح لا يدعم الصوت");
            const recognition = new Speech();
            recognition.lang = 'ar-MA';
            recognition.onresult = (e) => {
                document.getElementById('user-query').value = e.results[0][0].transcript;
                runSearch();
            };
            recognition.start();
        }
    </script>
{% endblock %}
