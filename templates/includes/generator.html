<div id="complaint-generator" style="background: #fdfdfd; border: 2px dashed #d4af37; padding: 25px; border-radius: 15px; margin-top: 30px;">
    <h3 style="color: #1a5e32; text-align: center;">🏛️ مولد الطلبات والشكايات القانونية</h3>
    <p style="font-size: 14px; text-align: center; color: #666;">أدخل بياناتك وسيقوم النظام بتحرير الشكاية لك فوراً</p>
    
    <input type="text" id="user-name" placeholder="الاسم الكامل" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd;">
    <select id="complaint-type" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd;">
        <option value="رشوة">تبليغ عن رشوة</option>
        <option value="تماطل">شكاية بسبب التماطل الإداري</option>
        <option value="شطط">شكاية شطط في استعمال السلطة</option>
    </select>
    
    <button onclick="generatePDF()" style="width: 100%; background: #1a5e32; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
        تحرير وتحميل الشكاية (PDF)
    </button>
</div>
