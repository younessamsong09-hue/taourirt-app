<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
async function runSearch(customQuery = null) {
    const query = customQuery || document.getElementById('user-query').value;
    const resArea = document.getElementById('results-area');
    if(!query) return;

    resArea.style.display = 'block';
    resArea.innerHTML = 'جاري المعالجة...';

    const response = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt: query})
    });
    const data = await response.json();

    if(data.found) {
        resArea.innerHTML = '';
        data.results.forEach(item => {
            if(item.type === "generator") {
                // عرض المحرر الحي
                resArea.innerHTML += `{% include 'includes/generator.html' %}`;
            } else {
                // عرض النتيجة العادية
                resArea.innerHTML += `
                <div class="result-card" style="background:white; padding:20px; border-radius:15px; margin-bottom:15px; border-right:8px solid #1a5e32; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
                    <h3>${item.title}</h3>
                    <p>${item.docs}</p>
                    <small>📍 ${item.location} | 💰 ${item.cost}</small>
                </div>`;
            }
        });
    }
}

// دالة إرسال التبليغات (الجمع والنقاش)
async function sendReport() {
    const text = document.getElementById('live-report').value;
    const response = await fetch('/report', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: text})
    });
    const data = await response.json();
    if(data.status === 'success') {
        alert("تم نشر صوتك في ركن المجتمع");
        location.reload(); 
    }
}
</script>
