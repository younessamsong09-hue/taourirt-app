<script>
    async function runSearch() {
        const query = document.getElementById('user-query').value.trim();
        const display = document.getElementById('results-display');
        if(!query) return;
        display.style.display = 'block';
        display.innerHTML = `<div style="text-align:center; padding:60px;"><div class="loader-royal"></div></div>`;
        try {
            const response = await fetch('/ask', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({prompt: query}) });
            const data = await response.json();
            if(data.found) {
                const docsList = data.docs.split('-').filter(i => i.trim() !== "").map(doc => `<div class="doc-card-premium"><div class="check-box">✓</div><p>${doc.trim()}</p></div>`).join('');
                display.innerHTML = `<div class="royal-card-final"><h2>${data.title}</h2><div class="docs-grid">${docsList}</div><button onclick="window.print()" class="btn-national-action">حفظ PDF</button></div>`;
            }
        } catch (e) { console.error("Error fetching data"); }
    }

    function openRealBook(type) {
        const urls = { 'family': '...', 'criminal': '...', 'constitution': '...' };
        const display = document.getElementById('results-display');
        display.style.display = 'block';
        display.innerHTML = `<div class="royal-card-final"><iframe src="${urls[type]}" style="width:100%; height:500px; border:none;"></iframe></div>`;
    }
</script>
