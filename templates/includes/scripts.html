<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
async function runSearch(customQuery = null) {
    const query = customQuery || document.getElementById('user-query').value;
    const resArea = document.getElementById('results-area');
    if(!query) return;

    resArea.style.display = 'block';
    resArea.innerHTML = '<div class="loader">جاري جلب البيانات الوطنية...</div>';

    const response = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt: query})
    });
    const data = await response.json();

    if(data.found) {
        resArea.innerHTML = ''; 
        data.results.forEach(item => {
            if(item.type === "generator") {
                // استدعاء محرر الشكايات
                resArea.innerHTML += `{% include 'includes/generator.html' %}`;
            } else {
                // عرض بطاقة خدمة احترافية
                resArea.innerHTML += `
                <div class="result-card" style="background:white; padding:30px; border-radius:20px; border-right:10px solid #1a5e32; margin-bottom:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
                    <h2 style="color:#1a5e32; margin-top:0;">${item.title}</h2>
                    <p style="font-size:16px; line-height:1.8;">${item.docs}</p>
                    <div style="margin-top:20px; padding-top:15px; border-top:1px solid #eee; display:flex; justify-content:space-between; color:#666;">
                        <span>📍 ${item.location}</span>
                        <span>💰 ${item.cost}</span>
                    </div>
                </div>`;
            }
        });
        resArea.scrollIntoView({ behavior: 'smooth' });
    }
}

function quickSearch(term) {
    document.getElementById('user-query').value = term;
    runSearch(term);
}
</script>
