<script>
// وظيفة البحث
async function runSearch() {
    const queryInput = document.getElementById('user-query');
    const display = document.getElementById('results-display');
    
    if (!queryInput || !display) return;

    const query = queryInput.value.trim();
    if (!query) return;

    // إظهار التحميل
    display.style.display = 'block';
    display.innerHTML = '<div style="text-align:center; padding:50px;"><div class="loader-royal"></div><p>جاري البحث في قاعدة البيانات...</p></div>';

    try {
        const response = await fetch('/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt: query})
        });
        const data = await response.json();

        if (data.found) {
            display.innerHTML = `
                <div class="royal-card-final" style="animation: slideUp 0.5s ease;">
                    <h2 style="color:#1a5e32; border-bottom:1px solid #eee; padding-bottom:10px;">${data.title}</h2>
                    <p style="background:#f8fafc; padding:15px; border-radius:15px; line-height:1.7;">${data.docs}</p>
                    <div style="margin-top:15px; font-size:14px;">📍 <b>مكان الإيداع:</b> ${data.location}</div>
                </div>`;
        } else {
            display.innerHTML = '<div class="royal-card-final" style="text-align:center;">🧐 لم نجد نتائج. جرب كلمات بسيطة.</div>';
        }
    } catch (e) {
        display.innerHTML = '<div class="royal-card-final" style="color:red; text-align:center;">❌ فشل الاتصال بالسيرفر.</div>';
    }
}

// وظيفة فتح الكتب في نافذة جديدة (لتجنب الورقة الحزينة)
function openRealBook(type) {
    const urls = {
        'family': 'https://www.justice.gov.ma/wp-content/uploads/2022/12/moudawana-al-ousra-ar.pdf',
        'criminal': 'https://adala.justice.gov.ma/production/html/ar/152342.htm',
        'constitution': 'https://www.sgg.gov.ma/Portals/0/constitution/constitution_2011_Ar.pdf'
    };
    
    if (urls[type]) {
        window.open(urls[type], '_blank');
    }
}

function startVoice() {
    alert("ميزة البحث الصوتي ستفعل قريباً!");
}
</script>
