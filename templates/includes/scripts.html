<script>
    // وظيفة البحث وربطها بالسيرفر
    async function runSearch() {
        const query = document.getElementById('user-query').value.trim();
        const display = document.getElementById('results-display');
        if(!query) return;

        display.style.display = 'block';
        display.innerHTML = `<div style="text-align:center; padding:60px;"><div class="loader-royal"></div></div>`;

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: query})
            });
            const data = await response.json();

            if(data.found) {
                const docsList = data.docs.split('-').filter(i => i.trim() !== "").map(doc => `
                    <div class="doc-card-premium"><div class="check-box">✓</div><p>${doc.trim()}</p></div>
                `).join('');
                
                display.innerHTML = `
                    <div class="royal-card-final" style="animation: slideUp 0.6s ease;">
                        <div class="card-header-national"><h2>${data.title}</h2></div>
                        <div class="docs-grid">${docsList}</div>
                        <div class="card-footer-info">
                            <div>📍 <b>جهة الإيداع:</b> ${data.location}</div>
                            ${data.cost ? `<div style="margin-top:5px;">💰 <b>الواجبات:</b> ${data.cost}</div>` : ''}
                        </div>
                        <div style="display:flex; gap:10px; margin-top:20px;">
                            <button onclick="window.print()" class="btn-national-action" style="flex:1;">حفظ PDF</button>
                            <a href="https://wa.me/?text=مسطرة ${data.title}" target="_blank" class="btn-national-action" style="flex:1; background:#25D366; text-align:center; text-decoration:none;">واتساب</a>
                        </div>
                    </div>`;
            } else {
                display.innerHTML = `<div class="royal-card-final">لم نجد نتائج لـ "${query}"</div>`;
            }
        } catch (e) { display.innerHTML = "خطأ في الاتصال"; }
    }

    // وظيفة فتح الـ PDF
    function openRealBook(type) {
        const urls = {
            'family': 'https://www.justice.gov.ma/wp-content/uploads/2022/12/moudawana-al-ousra-ar.pdf',
            'criminal': 'https://www.sgg.gov.ma/Portals/0/Lois/code_penal_ar.pdf',
            'constitution': 'https://www.sgg.gov.ma/Portals/0/constitution/constitution_2011_Ar.pdf'
        };
        const display = document.getElementById('results-display');
        display.style.display = 'block';
        display.innerHTML = `<div class="royal-card-final"><iframe src="${urls[type]}" style="width:100%; height:600px; border:none; border-radius:15px;"></iframe></div>`;
        window.scrollTo({ top: display.offsetTop - 80, behavior: 'smooth' });
    }

    // الحقائق المتغيرة
    const nationalFacts = ["البطاقة الوطنية تُغنيك عن شهادة الميلاد.", "يمكن طلب السجل العدلي إلكترونياً.", "تطبيق هويتي الرقمية يسهل المساطر."];
    let factIdx = 0;
    setInterval(() => {
        const p = document.getElementById('dynamic-info');
        if(p) { p.style.opacity = 0; setTimeout(() => { p.innerText = nationalFacts[factIdx]; p.style.opacity = 1; factIdx = (factIdx+1)%nationalFacts.length; }, 500); }
    }, 8000);
</script>
