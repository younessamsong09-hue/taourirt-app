<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
async function runSearch(customQuery = null) {
    const query = customQuery || document.getElementById('user-query').value;
    const resArea = document.getElementById('results-area');
    if(!query) return;

    resArea.style.display = 'block';
    resArea.innerHTML = '<p style="text-align:center;">جاري البحث...</p>';

    const response = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt: query})
    });
    const data = await response.json();
    resArea.innerHTML = '';

    if(data.found) {
        data.results.forEach(item => {
            if(item.type === "generator") {
                // جلب المولد من المكان المخفي في index.html
                resArea.innerHTML = document.getElementById('generator-template-source').innerHTML;
            } else {
                resArea.innerHTML += `
                <div class="result-card" style="background:white; padding:20px; border-radius:15px; margin-bottom:15px; border-right:8px solid #1a5e32;">
                    <h3>${item.title}</h3>
                    <p>${item.docs}</p>
                    <small>📍 ${item.location} | 💰 ${item.cost}</small>
                </div>`;
            }
        });
        resArea.scrollIntoView({ behavior: 'smooth' });
    }
}

function quickSearch(term) {
    document.getElementById('user-query').value = term;
    runSearch(term);
}
</script>
