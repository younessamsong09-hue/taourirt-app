<script>
    // دالة البحث الرئيسية التي تتواصل مع app.py
    async function runSearch() {
        const query = document.getElementById('user-query').value;
        const display = document.getElementById('results-area'); // تأكد أن id مطابق لملف results_area.html
        
        if (!query.trim()) return;

        display.style.display = 'block';
        display.innerHTML = `
            <div style="text-align:center; padding: 20px;">
                <div style="color: #1a5e32; font-weight: bold;">جاري البحث في الأرشيف الوطني...</div>
            </div>`;

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: query})
            });
            const data = await response.json();

            if (data.found) {
                display.innerHTML = '';
                data.results.forEach(item => {
                    display.innerHTML += `
                        <div class="result-card" style="background: white; padding: 25px; border-radius: 15px; border-right: 10px solid #1a5e32; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px;">
                            <h2 style="color: #1a5e32; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px;">${item.title}</h2>
                            <p style="line-height: 1.8; color: #444; font-size: 16px;">${item.docs}</p>
                            <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; font-size: 14px;">
                                <span style="background: #eef7f1; padding: 5px 15px; border-radius: 5px; color: #1a5e32;">📍 المكان: ${item.location}</span>
                                <span style="background: #fff9e6; padding: 5px 15px; border-radius: 5px; color: #b08d1a;">💰 التكلفة: ${item.cost}</span>
                            </div>
                        </div>
                    `;
                });
                display.scrollIntoView({ behavior: 'smooth' });
            } else {
                display.innerHTML = '<div style="padding: 20px; text-align: center; color: #888;">لم نجد نتائج دقيقة. جرب استخدام كلمات مثل: رشوة، جواز، محامي، أو تصفح الأقسام أدناه.</div>';
            }
        } catch (error) {
            display.innerHTML = '<div style="padding: 20px; color: red; text-align: center;">خطأ فني في الاتصال بالمرجع الوطني.</div>';
        }
    }

    // وظيفة الضغط على البطاقات
    function quickSearch(term) {
        const searchInput = document.getElementById('user-query');
        if (searchInput) {
            searchInput.value = term;
            runSearch();
        }
    }
</script>
