<script>
    // وظيفة البحث
    async function runSearch() {
        const query = document.getElementById('user-query').value.trim();
        const display = document.getElementById('results-display');
        
        if(!query || !display) return;

        display.style.display = 'block';
        display.innerHTML = `<div style="text-align:center; padding:50px;"><div class="loader-royal"></div></div>`;

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: query})
            });
            const data = await response.json();

            if(data.found) {
                // عرض النتائج في البطاقة الملكية
                display.innerHTML = `
                    <div class="royal-card-final" style="animation: slideUp 0.5s ease;">
                        <h2 style="color:#1a5e32; border-bottom:1px solid #eee; padding-bottom:10px;">${data.title}</h2>
                        <p style="background:#f8fafc; padding:15px; border-radius:15px;">${data.docs}</p>
                        <div style="margin-top:15px; font-size:14px;">📍 <b>المكان:</b> ${data.location}</div>
                    </div>`;
            } else {
                display.innerHTML = `<div class="royal-card-final" style="text-align:center;">🧐 لم نجد نتائج. جرب كلمات أخرى.</div>`;
            }
        } catch (e) {
            console.error(e);
            display.innerHTML = `<div class="royal-card-final" style="color:red; text-align:center;">❌ فشل الاتصال بالسيرفر.</div>`;
        }
    }

    // وظيفة فتح الكتب
    function openRealBook(type) {
        const urls = {
            'family': 'https://www.justice.gov.ma/wp-content/uploads/2022/12/moudawana-al-ousra-ar.pdf',
            'criminal': 'https://www.sgg.gov.ma/Portals/0/Lois/code_penal_ar.pdf',
            'constitution': 'https://www.sgg.gov.ma/Portals/0/constitution/constitution_2011_Ar.pdf'
        };
        const display = document.getElementById('results-display');
        if(!display) return;
        
        display.style.display = 'block';
        display.innerHTML = `<div class="royal-card-final"><iframe src="${urls[type]}" style="width:100%; height:600px; border:none; border-radius:15px;"></iframe></div>`;
        window.scrollTo({ top: display.offsetTop - 80, behavior: 'smooth' });
    }
</script>
