<script>
    // 1. الدالة الأساسية للبحث التي تنادي السيرفر
    async function runSearch() {
        const queryInput = document.getElementById('user-query'); // تأكد أن id المربع في search_bar.html هو user-query
        const query = queryInput.value.trim();
        const displayArea = document.getElementById('results-area'); // الحاوية الكبيرة
        const container = document.getElementById('results-container'); // مكان صب النتائج

        if (!query) return;

        // إظهار منطقة النتائج وتصفيرها مع وضع رسالة انتظار
        displayArea.style.display = 'block';
        container.innerHTML = '<div style="text-align:center; padding:20px; color:#1a5e32;">جاري استخراج البيانات الرسمية...</div>';

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: query})
            });
            const data = await response.json();

            if (data.found) {
                container.innerHTML = ''; // مسح رسالة الانتظار
                data.results.forEach(item => {
                    container.innerHTML += `
                        <div class="result-card" style="background:#fff; border-radius:15px; padding:25px; margin-bottom:20px; border-right:10px solid #1a5e32; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
                            <h2 style="color:#1a5e32; margin-top:0;">${item.title}</h2>
                            <p style="line-height:1.8; color:#333;">${item.docs}</p>
                            <div style="background:#f9f9f9; padding:10px; border-radius:8px; font-size:14px; margin-top:10px;">
                                <strong>📍 المكان:</strong> ${item.location} | <strong>💰 التكلفة:</strong> ${item.cost}
                            </div>
                            ${item.link ? `<a href="${item.link}" target="_blank" style="display:inline-block; margin-top:15px; color:#d4af37; font-weight:bold; text-decoration:none;">🔗 الرابط الرسمي</a>` : ''}
                        </div>
                    `;
                });
                // تمرير الشاشة للنتائج بسلاسة
                displayArea.scrollIntoView({ behavior: 'smooth' });
            } else {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">لم نجد بيانات دقيقة لهذه الكلمة. حاول كتابة: رشوة، باسبور، أو سيارة.</div>';
            }
        } catch (error) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:red;">عذراً، وقع خطأ في الاتصال بقاعدة البيانات.</div>';
        }
    }

    // 2. دالة الربط بين البطاقة والبحث (التي تناديها عند الضغط على البطاقة)
    function quickSearch(term) {
        const input = document.getElementById('user-query');
        if (input) {
            input.value = term;
            runSearch(); // تشغيل البحث فوراً بعد ملء المربع
        }
    }
</script>
