<script>
    async function runSearch() {
        const query = document.getElementById('user-query').value.trim();
        const display = document.getElementById('results-display');
        if(!query || !display) return;

        display.style.display = 'block';
        display.innerHTML = `<div style="text-align:center; padding:60px;"><div class="loader-royal"></div></div>`;

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: query})
            });
            const data = await response.json();

            if(data.found) {
                const docsList = data.docs.split('-').filter(s => s.trim() !== "").map(doc => `
                    <div class="doc-card-premium"><div class="check-box">✓</div><p>${doc.trim()}</p></div>
                `).join('');
                
                display.innerHTML = `
                    <div class="royal-card-final">
                        <h2 style="color:#1a5e32;">${data.title}</h2>
                        <div class="docs-grid">${docsList}</div>
                        <div style="margin-top:15px; padding:15px; background:#f8fafc; border-radius:15px; font-size:14px;">
                            📍 <b>الإيداع:</b> ${data.location}
                        </div>
                    </div>`;
            } else {
                display.innerHTML = `<div class="royal-card-final">🧐 لم نجد نتائج لـ "${query}"</div>`;
            }
        } catch (e) {
            display.innerHTML = `<div class="royal-card-final" style="color:red;">❌ خطأ في السيرفر.</div>`;
        }
    }

    function openRealBook(type) {
        const urls = {
            'family': 'https://www.justice.gov.ma/wp-content/uploads/2022/12/moudawana-al-ousra-ar.pdf',
            'criminal': 'https://www.sgg.gov.ma/Portals/0/Lois/code_penal_ar.pdf',
            'constitution': 'https://www.sgg.gov.ma/Portals/0/constitution/constitution_2011_Ar.pdf'
        };
        const display = document.getElementById('results-display');
        display.style.display = 'block';
        display.innerHTML = `<div class="royal-card-final"><iframe src="${urls[type]}" style="width:100%; height:600px; border:none; border-radius:15px;"></iframe></div>`;
        window.scrollTo({ top: display.offsetTop - 80, behavior: 'smooth' });
    }
</script>
