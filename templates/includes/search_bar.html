<section style="max-width: 800px; margin: 0 auto 40px; padding: 0 15px;">
    <div class="search-container-national" style="position: relative; background: white; border-radius: 50px; padding: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 2px solid #1a5e32; display: flex; align-items: center;">
        <button type="button" onclick="runSearch()" style="background: #1a5e32; border: none; width: 50px; height: 50px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;">
            🔍
        </button>
        
        <input type="text" id="user-query" placeholder="ابحث عن مسطرة (مثلاً: جواز السفر)..." 
               style="flex: 1; border: none; padding: 0 20px; font-size: 16px; outline: none; font-family: 'Tajawal'; text-align: right;">
        
        <button type="button" onclick="startVoice()" style="background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; color: #64748b; margin-left: 10px; cursor: pointer;">
            🎙️
        </button>
    </div>
</section>
