<div class="search-wrapper" style="position: relative; margin: 30px 0;">
    <div style="background: white; padding: 10px 15px; border-radius: 50px; box-shadow: var(--shadow); display: flex; align-items: center; border: 2px solid var(--main-green);">
        
        <button onclick="startVoice()" id="voice-btn" style="background: #f8fafc; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 20px; transition: 0.3s;">
            🎤
        </button>

        <input type="text" id="user-query" placeholder="تحدث أو اكتب مشكلتك..." 
               style="flex: 1; border: none; outline: none; font-family: 'Tajawal'; font-size: 16px; padding: 0 15px; background: transparent;">
        
        <button onclick="runSearch()" style="background: var(--main-green); border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; transition: 0.3s;">
            🔍
        </button>
    </div>
    <div id="voice-status" style="text-align: center; font-size: 12px; color: var(--main-green); margin-top: 5px; font-weight: bold; display: none;">
        🔴 جاري الاستماع.. تحدث الآن
    </div>
</div>

<script>
    function startVoice() {
        if (!('webkitSpeechRecognition' in window)) {
            alert("عذراً، متصفحك لا يدعم البحث الصوتي. جرب متصفح Chrome.");
            return;
        }

        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'ar-MA'; // دعم الدارجة واللغة العربية
        const voiceBtn = document.getElementById('voice-btn');
        const status = document.getElementById('voice-status');

        recognition.onstart = () => {
            voiceBtn.style.background = '#ff4757';
            voiceBtn.style.color = 'white';
            status.style.display = 'block';
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('user-query').value = text;
            runSearch(); // ابحث تلقائياً بعد سماع الصوت
        };

        recognition.onend = () => {
            voiceBtn.style.background = '#f8fafc';
            status.style.display = 'none';
        };

        recognition.start();
    }
</script>
