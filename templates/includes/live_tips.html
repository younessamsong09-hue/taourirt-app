<div class="tips-slider" style="background: #fff9db; padding: 10px; border-radius: 10px; margin: 15px 0; display: flex; align-items: center; gap: 10px; border: 1px dashed #fab005; overflow: hidden;">
    <span style="font-size: 18px;">💡</span>
    <div id="tip-text" style="font-size: 12px; color: #856404; font-weight: bold; white-space: nowrap; animation: slideText 15s linear infinite;">
        نصيحة اليوم: تأكد من صلاحية بطاقتك الوطنية قبل التوجه للمقاطعة بـ 3 أشهر على الأقل.
    </div>
</div>

<style>
    @keyframes slideText {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
    }
</style>

<script>
    const tips = [
        "نصيحة اليوم: تأكد من صلاحية بطاقتك الوطنية قبل التوجه للمقاطعة.",
        "هل تعلم؟ يمكنك الآن طلب عقد الازدياد إلكترونياً عبر بوابة 'وثيقة'.",
        "تنبيه: رسوم جواز السفر تُدفع الآن حصرياً عبر التمبر الإلكتروني.",
        "لأهل تاوريرت: الملحقة الإدارية تفتح أبوابها من 8:30 صباحاً."
    ];
    let currentTip = 0;
    
    setInterval(() => {
        currentTip = (currentTip + 1) % tips.length;
        document.getElementById('tip-text').innerText = tips[currentTip];
    }, 5000); // تغيير النصيحة كل 5 ثوانٍ
</script>
